name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      runner:
        description: Runner preference
        required: true
        default: auto
        type: choice
        options:
          - auto
          - home
          - github-hosted

jobs:
  route:
    runs-on: ubuntu-24.04
    outputs:
      runs_on_linux: ${{ steps.pick.outputs.runs_on_linux }}
      selected: ${{ steps.pick.outputs.selected }}
    steps:
      - id: pick
        env:
          GH_TOKEN: ${{ secrets.RUNNER_QUERY_TOKEN }}
          RUNNER_INPUT: ${{ inputs.runner || 'auto' }}
        shell: bash
        run: |
          set -euo pipefail

          github_linux='"ubuntu-latest"'
          home='["self-hosted","Linux","X64","home","tiny310"]'

          if [[ "$RUNNER_INPUT" == "github-hosted" ]]; then
            echo "runs_on_linux=$github_linux" >> "$GITHUB_OUTPUT"
            echo "selected=github-hosted-requested" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          runners="$(gh api "orgs/JeremyProffittOrg/actions/runners?per_page=100")"
          available="$(
            jq -r '
              .runners[]
              | select(.name == "tiny310")
              | select(.status == "online")
              | select(.busy == false)
              | [.labels[].name] as $labels
              | select(["self-hosted","Linux","X64","home","tiny310"] - $labels | length == 0)
              | .name
            ' <<< "$runners" | head -n 1
          )"

          if [[ "$RUNNER_INPUT" == "home" && -z "$available" ]]; then
            echo "tiny310 was requested but is not online and idle" >&2
            exit 1
          fi

          if [[ -n "$available" ]]; then
            echo "runs_on_linux=$home" >> "$GITHUB_OUTPUT"
            echo "selected=home-auto" >> "$GITHUB_OUTPUT"
          else
            echo "runs_on_linux=$github_linux" >> "$GITHUB_OUTPUT"
            echo "selected=github-hosted-fallback" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Test
    needs: route
    runs-on: ${{ matrix.os == 'ubuntu-latest' && fromJSON(needs.route.outputs.runs_on_linux) || matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.21', '1.22']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Get dependencies
        run: go mod download

      - name: Run unit tests
        run: go test -v -race ./...

      - name: Build server
        run: go build -v -o go-mcp-file-context-server${{ matrix.os == 'windows-latest' && '.exe' || '' }} .

      - name: Build MCP test client
        run: go build -v -o mcp_test_client${{ matrix.os == 'windows-latest' && '.exe' || '' }} .
        working-directory: test/mcp_test_client

      - name: Run MCP integration tests
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            MCP_SERVER_PATH="${{ github.workspace }}/go-mcp-file-context-server.exe" ./mcp_test_client.exe
          else
            MCP_SERVER_PATH="${{ github.workspace }}/go-mcp-file-context-server" ./mcp_test_client
          fi
        working-directory: test/mcp_test_client
        shell: bash

  build-all-platforms:
    name: Build All Platforms
    needs: route
    runs-on: ${{ fromJSON(needs.route.outputs.runs_on_linux) }}
    strategy:
      matrix:
        include:
          - os: darwin
            arch: arm64
          - os: darwin
            arch: amd64
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get dependencies
        run: go mod download

      - name: Build for ${{ matrix.os }}/${{ matrix.arch }}
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            go build -ldflags="-s -w" -o go-mcp-file-context-server.exe .
          else
            go build -ldflags="-s -w" -o go-mcp-file-context-server .
          fi
